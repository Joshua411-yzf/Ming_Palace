<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文物展示网页</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
	  font-family: "agency fb","隶书",sans-serif;
    }

    body {
     background-image: url("img/a明故宫内页.png");
     background-size: cover;
     background-position: center;
     background-attachment: fixed;
      color: #3b2f2f;
      /* min-height: 100vh; */
	   /* overflow: hidden; */ 
	   height: 100vh; 
    }

    .page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px;
    }

    .header {
      margin-bottom: 24px;
      text-align: center;
    }

    .header h1 {
      letter-spacing: 3px;
      color: #7a3e1d;
	  font-size: 80px;
	  font-weight: 400;
	  margin-bottom: 1px;
	  font-family: "agency fb","隶书";
    }

    .header p {
      color: #7d6a58;
      font-size: 16px;
    }

    .main {
		margin-bottom: 100px;
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .left-panel {
		margin-top: -40px;
      width: 60%;
      /* background: rgba(255, 255, 255, 0.72); */
      /* border: 1px solid rgba(122, 62, 29, 0.12); */
      border-radius: 24px;
      padding: 24px;
      /* box-shadow: 0 12px 30px rgba(92, 55, 27, 0.1);
      backdrop-filter: blur(6px); */
    }

    .post-card {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .switch-bar {
      display: none;
    }

    .arrow-btn {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 50%;
      background: #fff4e6;
      color: #7a3e1d;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .arrow-btn:hover {
      transform: translateY(-1px);
      background: #fde7cb;
    }

    .artifact-copy {
		width: 102%;
      /* background: url(img/38.png);
      background-size: 100% 100%; */
      /* border-radius: 18px; */
      padding: 20px;
      line-height: 1.9;
      font-size: 17px;
      /* border: 1px solid #eadcc8; */
      height: 120px;
	  
    }

    .artifact-image-wrap {
      border-radius: 22px;
      background: #f7ecda;
      border: 1px solid #eadcc8;
      width: 60%;
      margin: 0 auto;
      position: relative;
    }

    .artifact-image-wrap img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      display: block;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 16px 8px 4px;
      font-size: 18px;
      color: #765841;
      /* border-top: 1px solid #eadcc8; */
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #765841;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .action-btn:hover {
      transform: translateY(-1px);
      color: #8d4d22;
    }

    .heart {
      font-size: 24px;
      color: #ffffff;
      text-shadow:
        -1px -1px 0 #9b6c53,
         1px -1px 0 #9b6c53,
        -1px  1px 0 #9b6c53,
         1px  1px 0 #9b6c53;
      transition: color 0.2s ease, text-shadow 0.2s ease;
    }

    .heart.liked {
      color: #e63946;
      text-shadow: none;
    }

    .divider {
      color: #c6ab90;
    }

    .comment-box {
      display: block;
      margin-top: 6px;
      background: #fff8ef;
      border-left: 4px solid #c48346;
      padding: 14px 16px;
      border-radius: 14px;
      color: #6e4b34;
      min-height: 96px;
    }

    .comment-empty {
      color: #9b7e64;
      font-size: 15px;
    }

    .comment-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px dashed #eadcc8;
    }

    .comment-item:last-child {
      border-bottom: none;
    }

    .comment-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      object-fit: cover;
    }

    .comment-content {
      flex: 1;
    }

    .comment-name {
      font-size: 14px;
      color: #8b5c3a;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .comment-text {
      line-height: 1.7;
      font-size: 15px;
    }

    .comment-input-row {
      display: flex;
      margin-top: 10px;
      gap: 10px;
    }

    .comment-input-row input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #d8c2aa;
      outline: none;
      font-size: 14px;
      background: #fffdf9;
    }

    .send-btn {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: #7a3e1d;
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
    }

    .right-panel {
		margin-top: -10px;
      width: 40%;
      /* background: rgba(122, 62, 29, 0.92); */
      color: #aa5500;
      border-radius: 24px;
	  
      padding:50px 20px 30px 20px;
      /* box-shadow: 0 14px 32px rgba(72, 35, 15, 0.18); */
      display: flex;
      flex-direction: column;
      /* justify-content: center; */
      align-items: center;
      position: relative;
      /* overflow: hidden; */
    }

    .right-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      /* background: radial-gradient(circle at top right, rgba(255,255,255,0.18), transparent 35%); */
      pointer-events: none;
    }

    .blindbox-title {
      font-size: 30px;
      margin-bottom: 12px;
      z-index: 1;
    }

    .blindbox-desc {
      text-align: center;
      line-height: 1.8;
      margin-bottom: 24px;
      color: #aa5500;
      z-index: 1;
    }

    .machine {
      width: 260px;
      height: 340px;
      background: linear-gradient(180deg, #fcefd7, #dfb07c);
      border-radius: 28px;
      border: 8px solid #f6d2a9;
      position: relative;
      box-shadow: inset 0 0 0 4px #c27d44, 0 16px 28px rgba(0,0,0,0.2);
      margin-bottom: 24px;
      z-index: 1;
      transform-origin: center bottom;
    }

    .machine.shaking {
      animation: shake 0.8s ease-in-out;
    }

    .machine-top {
      width: 170px;
      height: 110px;
      border-radius: 90px 90px 24px 24px;
      background: rgba(255,255,255,0.45);
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid rgba(255,255,255,0.65);
      overflow: hidden;
    }

    .capsules {
      position: absolute;
      inset: 12px;
    }

    .capsule {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      position: absolute;
      box-shadow: inset -5px -5px 0 rgba(0,0,0,0.08);
    }

    .capsule:nth-child(1) { top: 18px; left: 20px; background: #f9a826; }
    .capsule:nth-child(2) { top: 24px; right: 18px; background: #ef476f; }
    .capsule:nth-child(3) { bottom: 18px; left: 38px; background: #06d6a0; }
    .capsule:nth-child(4) { bottom: 20px; right: 34px; background: #118ab2; }
    .capsule:nth-child(5) { top: 40px; left: 78px; background: #ffd166; }

    .slot {
      width: 90px;
      height: 18px;
      background: #7a3e1d;
      border-radius: 10px;
      position: absolute;
      bottom: 78px;
      left: 50%;
      transform: translateX(-50%);
    }

    .handle-box {
      position: absolute;
      right: 18px;
      top: 140px;
      width: 18px;
      height: 90px;
      background: #f3c89a;
      border-radius: 12px;
    }

    .handle-ball {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #d94f3d;
      position: absolute;
      right: -8px;
      top: 128px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.18);
    }

    .draw-btn {
      z-index: 1;
      background: #fff2dc;
      color: #7a3e1d;
      border: none;
      border-radius: 999px;
      padding: 14px 28px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0,0,0,0.12);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .draw-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 24px rgba(0,0,0,0.16);
    }

    .draw-btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 99;
    }

    .modal.show {
      display: flex;
      animation: fadeIn 0.25s ease;
    }

    .modal-content {
      width: min(460px, 100%);
      background: #fffaf4;
      border-radius: 24px;
      padding: 30px 28px;
      text-align: center;
      box-shadow: 0 24px 48px rgba(0,0,0,0.2);
      border: 1px solid #efdcc6;
    }

    .modal-content h3 {
      font-size: 28px;
      color: #8b3f19;
      margin-bottom: 14px;
    }

    .modal-content p {
      font-size: 18px;
      line-height: 1.8;
      color: #5e4433;
      margin-bottom: 20px;
    }

    .close-btn {
      background: #8b3f19;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 16px;
    }

    @keyframes shake {
      0% { transform: rotate(0deg); }
      20% { transform: rotate(-3deg); }
      40% { transform: rotate(3deg); }
      60% { transform: rotate(-2deg); }
      80% { transform: rotate(2deg); }
      100% { transform: rotate(0deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 980px) {
      .main {
        flex-direction: column;
      }

      .left-panel,
      .right-panel {
        width: 100%;
      }

      .artifact-image-wrap img {
        height: 380px;
      }
    }
	/* ========== 新增：返回首页按钮样式 ========== */
	    .back-home-btn {
	      position: absolute;
	      top: 40px;
	      left: 120px;
	      z-index: 999; /* 确保按钮在最上层 */
	      width: 180px;
	      height: 60px;
	      border: none;
	      /* border-radius: 8px; */
	      cursor: pointer;
	      /* 核心：背景图片与文字分层 */
	      display: flex;
	      align-items: center;
	      justify-content: center;
	      font-size: 20px;
	      font-weight: bold;
	      color: #733900;
	      text-decoration: none; /* 去掉a标签默认下划线 */
	      overflow: hidden;
	    }
	
	    /* 背景图层（单独用于旋转） */
	    .btn-bg {
	      position: absolute;
	      top: 0;
	      left: 0;
	      width: 100%;
	      height: 100%;
	      background: url("img/017.png") no-repeat center center; /* 替换为你的按钮背景图 */
	      background-size: cover;
	     
	      z-index: 1; /* 背景在文字下方 */
	    }
		
		/* 单个图片样式 - 可独立调整位置/大小/层级 */
		.layer-image {
		    position: absolute;
		    pointer-events: auto; /* 如需点击图片可保留，否则设为none */
		    /* 基础样式，可根据图片调整 */
		    width: 40px; /* 初始宽度，按需修改 */
		    height: auto; /* 保持宽高比 */
		    opacity: 1; /* 透明度，可选 */
		    transition: all 0.3s ease; /* 调整时平滑过渡，可选 */
		}
		
		/* 示例：给不同图片加类名，方便单独调整 */
		.img-1 {
		    top: 17%; /* 距离顶部百分比/像素 */
		    left: 5%; /* 距离左侧百分比/像素 */
		    z-index: 3; /* 可单独调整层级 */
		}
  </style>
</head>
<body>
	<!-- 图片图层容器 - 独立于原有结构 -->
		<div class="images-layer">
		    <!-- 示例图片1：替换src为你的图片路径，调整类名对应CSS -->
		    <img src="img/头像3.png" alt="装饰图片1" class="layer-image img-1">
		    
		</div>
	<a href="导航.html" class="back-home-btn"> <!-- 替换index.html为你的首页地址 -->
	  <div class="btn-bg"></div> <!-- 背景图层（旋转） -->
	  <span class="btn-text">返回首页</span> <!-- 文字层（静止） -->

  <div class="page">
    <header class="header">
      <h1>古物证史—笺寄风华</h1>
    </header>

    <main class="main">
      <section class="left-panel">
        <div class="post-card">
          

          <div class="artifact-copy" id="artifactText"></div>

          <div class="artifact-image-wrap">
            <button class="arrow-btn" id="prev" style="position:absolute;left:-60px;top:50%;transform:translateY(-50%)">⬅</button>
            <img id="artifactImg" alt="文物展示图" />
            <button class="arrow-btn" id="next" style="position:absolute;right:-60px;top:50%;transform:translateY(-50%)">➡</button>
          </div>

          <div class="toolbar">
            <button class="action-btn" id="likeBtn" type="button">
              <span class="heart" id="heartIcon">❤</span>
              <span>点赞</span>
            </button>
            <span class="divider">|</span>
            <button class="action-btn" id="commentBtn" type="button">
              <span>💬</span>
              <span>评论</span>
            </button>
          </div>

          <div class="comment-box" id="commentBox">
            <div class="comment-empty">点击“评论”可随机查看该文物的趣味评论，也可以发布自己的评论。</div>
          </div>

          <div class="comment-input-row">
            <input id="commentInput" placeholder="写评论..." />
            <button class="send-btn" id="sendBtn" type="button">发布</button>
          </div>
        </div>
      </section>

      <aside class="right-panel">
        <h2 class="blindbox-title">宫廷文创盲盒机</h2>
        <p class="blindbox-desc">
          点击按钮摇动盲盒机，
          随机解锁一份与你的文物之旅相配的明风文创。
        </p>

        <div class="machine" id="machine">
          <div class="machine-top">
            <div class="capsules">
              <span class="capsule"></span>
              <span class="capsule"></span>
              <span class="capsule"></span>
              <span class="capsule"></span>
              <span class="capsule"></span>
            </div>
          </div>
          <div class="handle-box"></div>
          <!-- <div class="handle-ball"></div> -->
          <div class="slot"></div>
        </div>

        <button class="draw-btn" id="drawBtn" type="button">点击抽取文创盲盒</button>
      </aside>
    </main>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h3>🎉 恭喜你！</h3>
      <img id="rewardImg" style="width:120px;height:120px;object-fit:cover;margin-bottom:10px;border-radius:12px" />
      <p id="rewardText">你获得了：宫廷纹样书签</p>
      <button class="close-btn" id="closeBtn" type="button">我知道啦</button>
    </div>
  </div>

  <script>

    const heartIcon = document.getElementById('heartIcon');
    const commentBtn = document.getElementById('commentBtn');

    const drawBtn = document.getElementById('drawBtn');
    const machine = document.getElementById('machine');
    const modal = document.getElementById('modal');
    const rewardText = document.getElementById('rewardText');
    const rewardImg = document.getElementById('rewardImg');
    const closeBtn = document.getElementById('closeBtn');

    const artifactText = document.getElementById('artifactText');

    const indexText = document.getElementById('indexText');

    let liked = false;

    const artifacts = [

        comments: [

          '明史研究员：白釉素雅却藏着帝王威严，明故宫的镇馆级宝贝！'
        ],
        userComments: []
      },
      {

        img: 'img/文物2.png',
        comments: [

        userComments: []
      },
      {

        userComments: []

      {
        name: '掐丝珐琅缠枝莲纹炉',

    function getCurrentArtifact() {
      return artifacts[current];
    }

    function clearCommentsDisplay() {
      commentBox.innerHTML = '<div class="comment-empty">点击“评论”可随机查看该文物的趣味评论，也可以发布自己的评论。</div>';
    }

    function createCommentElement(name, text, avatarUrl) {
      const item = document.createElement('div');
      item.className = 'comment-item';

      const avatar = document.createElement('img');
      avatar.className = 'comment-avatar';
      avatar.src = avatarUrl;
      avatar.alt = name;

      const content = document.createElement('div');
      content.className = 'comment-content';

      const title = document.createElement('div');
      title.className = 'comment-name';
      title.textContent = name;

      const body = document.createElement('div');
      body.className = 'comment-text';
      body.textContent = text;

      content.appendChild(title);
      content.appendChild(body);
      item.appendChild(avatar);
      item.appendChild(content);

      return item;
    }

    function renderComments() {
      const artifact = getCurrentArtifact();
      const officialComments = artifact.officialShownComments || [];
      const userComments = artifact.userComments || [];
      commentBox.innerHTML = '';

      const allComments = [...officialComments, ...userComments];
      if (allComments.length === 0) {
        clearCommentsDisplay();
        return;
      }

      allComments.forEach((comment) => {
        const el = createCommentElement(comment.name, comment.text, comment.avatar);
        commentBox.appendChild(el);
      });
    }

    function render() {
        const artifact = getCurrentArtifact();
        artifactText.innerText = artifact.text;
        artifactImg.src = artifact.img;
        artifactImg.alt = artifact.name;
    
        liked = false;
        heartIcon.classList.remove('liked');
    
        // 切换文物时，评论区恢复默认提示语
        clearCommentsDisplay();
    
        // 顺手清空输入框，体验更一致
        commentInput.value = '';
      }


    function addOfficialComment() {
      const artifact = getCurrentArtifact();
      if (!artifact.officialShownComments) {
        artifact.officialShownComments = [];
      }

      const randomIndex = Math.floor(Math.random() * artifact.comments.length);
      const text = artifact.comments[randomIndex];

      artifact.officialShownComments.push({
        name: '趣味评论',
        text,
        avatar: 'img/头像1.png'
      });

      renderComments();
    }

    function addUserComment(text) {
      const artifact = getCurrentArtifact();
      artifact.userComments.push({
        name: '游客2333',
        text,
        avatar: 'img/头像2.png'
      });
      renderComments();
    }

    prev.addEventListener('click', () => {
      current = (current - 1 + artifacts.length) % artifacts.length;
      render();
    });

    next.addEventListener('click', () => {
      current = (current + 1) % artifacts.length;
      render();
    });

    likeBtn.addEventListener('click', () => {
      liked = !liked;
      heartIcon.classList.toggle('liked', liked);
    });

    commentBtn.addEventListener('click', () => {
      addOfficialComment();
    });

    sendBtn.addEventListener('click', () => {
      const text = commentInput.value.trim();
      if (!text) return;
      addUserComment(text);
      commentInput.value = '';
    });

    commentInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        sendBtn.click();
      }
    });

    const rewards = [
      {name:'明白玉卧兽镇纸',img:'img/文创1.png'},
      {name:'玉组配挂件',img:'img/文创2.png'},
      {name:'掐丝珐琅缠枝莲纹炉摆件',img:'img/文创3.png'},
      {name:'剔红牡丹纹圆徽章',img:'img/文创4.png'}
      // {name:'鎏金花纹书签',img:'https://picsum.photos/200?205'},
      // {name:'宫廷文创钥匙扣',img:'https://picsum.photos/200?206'}
    ];

    drawBtn.addEventListener('click', () => {
      drawBtn.disabled = true;
      machine.classList.add('shaking');

      setTimeout(() => {
        machine.classList.remove('shaking');
        const reward = rewards[Math.floor(Math.random() * rewards.length)];
        rewardText.textContent = '恭喜用户获得：' + reward.name;
        rewardImg.src = reward.img;
        modal.classList.add('show');
        drawBtn.disabled = false;
      }, 900);
    });

    closeBtn.addEventListener('click', () => {
      modal.classList.remove('show');
    });

    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        modal.classList.remove('show');
      }
    });

    function runTests() {
      console.assert(Array.isArray(artifacts), 'artifacts 应为数组');
      console.assert(artifacts.length === 9, '应有 9 件文物');
      console.assert(artifacts.every(item => item.comments.length === 3), '每件文物应有 3 条评论');
      console.assert(typeof addOfficialComment === 'function', 'addOfficialComment 应存在');
      console.assert(typeof addUserComment === 'function', 'addUserComment 应存在');
    }

    runTests();
    render();
  </script>

    <style>

        /* 复制代码按钮 */

        .avatar {

        .typing-indicator {

        .typing-indicator span {

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }

        @keyframes typing {

        .input-container {

            background-size: 100% 100%;

            display: flex;

            flex-wrap: wrap;
        }

        #messageInput {
            flex: 1;

        #sendButton {

        .new-chat-button {

<body>
	<!-- ========== 新增：返回首页按钮 ========== -->

    <div class="chat-container">
        <div class="chat-header">
            <h1>明故宫参观 AI 助手</h1>
            <p>故阙楼台入碧霄，翠辇銮声尽寂寥</p>
        </div>

        <div class="messages-container" id="messagesContainer">
            <!-- 欢迎消息会通过JavaScript动态添加 -->
        </div>

        <div class="input-container">
            <input type="text" id="messageInput" placeholder="输入您的问题..." autocomplete="off">
            <button id="sendButton" onclick="sendMessage()">
                <span class="send-icon">➤</span>
            </button>
            <div class="button-group">
                <button class="new-chat-button" onclick="startNewChat()">新建对话</button>
                <button class="clear-button" onclick="clearChat()">清空消息</button>
            </div>
        </div>
    </div>

    <script>
        // ===== 在这里设置您的DeepSeek API Key =====
        // 格式：sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
        const DEEPSEEK_API_KEY = 'sk-1fa52278872d4f85b4c3441a71ff39f7';  // 请替换为您的实际API Key
        // ==========================================

        // 配置marked
        marked.setOptions({
            breaks: true,
            gfm: true,
            headerIds: true,
            mangle: false,
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return hljs.highlight(code, { language: lang }).value;
                    } catch (err) {}
                }
                return code;
            }
        });

        // DeepSeek API 配置
        const DEEPSEEK_API_URL = 'https://api.deepseek.com/chat/completions';

        // 初始化欢迎消息
        function initializeChat() {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'message bot';
            welcomeDiv.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="message-content">
                    <p>你好！关于明故宫的问题随便问！</p>
                </div>
            `;
            container.appendChild(welcomeDiv);
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // 在界面上显示用户消息
            addMessageToChat('user', message);
            
            // 清空输入框
            input.value = '';
            
            // 显示“正在输入”指示器
            showTypingIndicator();
            
            try {
                // 构建对话历史
                const conversationHistory = buildConversationHistory();
                
                // 直接调用DeepSeek API
                const response = await callDeepSeekAPI(conversationHistory);
                
                // 移除“正在输入”指示器
                removeTypingIndicator();
                
                if (response && response.choices && response.choices[0]) {
                    const botMessage = response.choices[0].message.content;
                    addMessageToChat('bot', botMessage);
                } else {
                    throw new Error('API响应格式不正确');
                }
            } catch (error) {
                removeTypingIndicator();
                showErrorMessage('请求失败：' + error.message);
                console.error('错误:', error);
            }
        }

        // 直接调用DeepSeek API
        async function callDeepSeekAPI(messages) {
            // 验证API Key是否存在
            if (!DEEPSEEK_API_KEY || DEEPSEEK_API_KEY === 'YOUR_DEEPSEEK_API_KEY_HERE' || DEEPSEEK_API_KEY.startsWith('sk-') === false) {
                throw new Error('请在代码中设置有效的DeepSeek API Key');
            }

            const response = await fetch(DEEPSEEK_API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: messages,
                    stream: false,
                    temperature: 1.0,
                    max_tokens: 4000
                })
            });
            
            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.error?.message || `HTTP ${response.status}`);
            }
            
            return await response.json();
        }

        // 构建对话历史
        function buildConversationHistory() {
            const messagesContainer = document.getElementById('messagesContainer');
            const messageElements = messagesContainer.children;
            
            const conversationHistory = [];
            
            for (let i = 0; i < messageElements.length; i++) {
                const msgElement = messageElements[i];
                
                if (msgElement.id === 'typingIndicator' || 
                    msgElement.className.includes('error-message')) {
                    continue;
                }
                
                if (msgElement.classList.contains('user')) {
                    const contentElement = msgElement.querySelector('.message-content');
                    if (contentElement) {
                        conversationHistory.push({ 
                            role: 'user', 
                            content: contentElement.textContent 
                        });
                    }
                } else if (msgElement.classList.contains('bot')) {
                    const contentElement = msgElement.querySelector('.message-content');
                    if (contentElement) {
                        conversationHistory.push({ 
                            role: 'assistant', 
                            content: contentElement.textContent 
                        });
                    }
                }
            }
            
            return conversationHistory;
        }

        // 渲染Markdown内容
        function renderMarkdown(content) {
            try {
                return marked.parse(content);
            } catch (error) {
                console.error('Markdown渲染错误:', error);
                return content;
            }
        }

        // 处理消息显示后的渲染
        function processRendering(container) {
            // 渲染数学公式
            if (typeof renderMathInElement === 'function') {
                try {
                    renderMathInElement(container, {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false},
                            {left: '\\(', right: '\\)', display: false},
                            {left: '\\[', right: '\\]', display: true}
                        ],
                        throwOnError: false
                    });
                } catch (error) {
                    console.error('数学公式渲染错误:', error);
                }
            }

            // 为代码块添加复制按钮
            container.querySelectorAll('pre').forEach(pre => {
                if (pre.querySelector('.copy-code-btn')) return;

                const code = pre.querySelector('code');
                if (!code) return;

                // 创建代码块头部
                const header = document.createElement('div');
                header.className = 'code-header';
                
                // 获取语言
                let lang = '';
                if (code.className) {
                    const match = code.className.match(/language-(\w+)/);
                    if (match) lang = match[1];
                }
                
                // 添加语言标签
                const langSpan = document.createElement('span');
                langSpan.className = 'code-language';
                langSpan.textContent = lang || 'text';
                header.appendChild(langSpan);
                
                // 添加复制按钮
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-code-btn';
                copyBtn.textContent = '复制代码';
                copyBtn.onclick = function(e) {
                    e.stopPropagation();
                    const codeText = code.textContent;
                    navigator.clipboard.writeText(codeText).then(() => {
                        copyBtn.textContent = '复制成功！';
                        setTimeout(() => {
                            copyBtn.textContent = '复制代码';
                        }, 2000);
                    }).catch(() => {
                        copyBtn.textContent = '复制失败';
                        setTimeout(() => {
                            copyBtn.textContent = '复制代码';
                        }, 2000);
                    });
                };
                header.appendChild(copyBtn);
                
                pre.insertBefore(header, pre.firstChild);
                
                // 应用代码高亮
                hljs.highlightElement(code);
            });
        }

        // 添加消息到聊天区域
        function addMessageToChat(role, content) {
            const container = document.getElementById('messagesContainer');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            if (role === 'bot') {
                contentDiv.innerHTML = renderMarkdown(content);
            } else {
                contentDiv.textContent = content;
            }
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            
            container.appendChild(messageDiv);
            
            if (role === 'bot') {
                processRendering(contentDiv);
            }
            
            container.scrollTop = container.scrollHeight;
        }

        // 显示“正在输入”动画
        function showTypingIndicator() {
            const container = document.getElementById('messagesContainer');
            removeTypingIndicator();
            
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typingIndicator';
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = '🤖';
            
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            
            typingDiv.appendChild(avatar);
            typingDiv.appendChild(indicator);
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;
        }

        // 移除“正在输入”动画
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        // 显示错误消息
        function showErrorMessage(msg) {
            const container = document.getElementById('messagesContainer');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = msg;
            container.appendChild(errorDiv);
            container.scrollTop = container.scrollHeight;
            
            setTimeout(() => {
                if (errorDiv.parentNode) {
                    errorDiv.remove();
                }
            }, 5000);
        }

        // 清空所有对话
        function clearChat() {
            if (confirm('确定要清空所有消息吗？')) {
                initializeChat();
            }
        }

        // 开始新的对话
        function startNewChat() {
            if (confirm('确定要开始新的对话吗？')) {
                initializeChat();
            }
        }

        // 回车发送
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        // 页面加载完成后初始化
        window.addEventListener('load', function() {
            initializeChat();
            document.getElementById('messageInput').focus();
            
            // 验证API Key
            if (!DEEPSEEK_API_KEY || DEEPSEEK_API_KEY === 'YOUR_DEEPSEEK_API_KEY_HERE') {
                showErrorMessage('请先在代码中设置有效的DeepSeek API Key');
            } else if (!DEEPSEEK_API_KEY.startsWith('sk-')) {
                showErrorMessage('API Key格式不正确，应该以sk-开头');
            }
        });
    </script>
</body>
</html>

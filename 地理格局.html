<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>明孝陵总览地图</title>
    <style type="text/css">
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "agency fb","隶书",sans-serif;
        }
        /* 页面背景 */
        body {
            background-image: url("img/a明故宫内页7.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            background-color: #f8f9fa;
            color: #333;
            position: relative; /* 为标注点定位做准备 */
            overflow-x: hidden; /* 隐藏横向滚动 */
        }
        /* 标题容器：宽度100%，高度占比20% */
        .title-container {
            width: 100%;
            height: 10vh;
            display: flex;
            align-items: center; /* 垂直居中 */
            padding-left: 30rem; /* 左侧内边距 */
            padding-top: 5rem;
        }
        .title-container h1{
            font-size: 80px;
            font-weight: 400;
            margin-bottom: 1px;
            font-family: "agency fb","隶书";
        }
        /* ========== 返回首页按钮样式 ========== */
        .back-home-btn {
            position: absolute;
            top: 52px;
            right: 57px;
            z-index: 999; /* 确保按钮在最上层 */
            width: 120px;
            height: 120px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            /* 核心：背景图片与文字分层 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #733900;
            text-decoration: none; /* 去掉a标签默认下划线 */
            overflow: hidden;
        }
        /* 背景图层（单独用于旋转） */
        .btn-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("img/027.png") no-repeat center center; /* 替换为你的按钮背景图 */
            background-size: cover;
            transition: transform 0.5s ease; /* 旋转过渡动画 */
            z-index: 1; /* 背景在文字下方 */
        }
        /* 文字层（静止） */
        .btn-text {
            position: relative;
            z-index: 2; /* 文字在背景上方 */
        }
        /* hover时背景旋转，文字不动 */
        .back-home-btn:hover .btn-bg {
            transform: rotate(360deg); /* 360度旋转，可改为180deg */
        }

        /* ========== 景点标注相关样式 ========== */
        /* 标注点容器 */
        .spot-markers {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 让标注点不阻挡背景点击（除了标注点本身） */
            transition: transform 0.8s ease; /* 新增：滑动动画 */
        }
        /* 标注点容器隐藏状态 */
        .spot-markers.hide {
            transform: translateX(-100%);
        }
        /* 单个标注点 */
        .spot-marker {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #733900;
            border: 3px solid white;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            cursor: pointer;
            pointer-events: auto; /* 恢复点击事件 */
            transform: translate(-50%, -50%); /* 让标注点中心对准定位点 */
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
            z-index: 10;
        }
        /* 标注点hover效果 */
        .spot-marker:hover {
            background: #ff3838;
            transform: translate(-50%, -50%) scale(1.2);
            transition: transform 0.3s ease;
        }
        /* 指示线容器（默认向右） */
        .indicator-line-container {
            position: absolute;
            top: 50%;
            left: 100%;
            height: 2px;
            display: flex;
            align-items: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInLine 1s ease forwards;
            pointer-events: none;
        }
        /* 向左的指示线容器 */
        .indicator-line-container.left {
            left: auto;
            right: 100%;
            flex-direction: row-reverse; /* 反转布局：卡片在前，线条在后 */
        }
        /* 向左的指示线容器调整卡片间距 */
        .indicator-line-container.left .spot-card {
            margin-left: 0;
            margin-right: 10px;
        }
        /* 指示线 */
        .indicator-line {
            height: 2px;
            background: #733900;
            background: linear-gradient(to right, #733900, #d35400);
            flex: 1;
            min-width: 50px;
        }
        /* 向左的指示线渐变方向调整 */
        .indicator-line-container.left .indicator-line {
            background: linear-gradient(to left, #733900, #d35400);
        }
        /* 景点小卡片 */
        .spot-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 15px;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            min-width: 120px;
            max-width: 350px;
            margin-left: 10px;
        }
        .spot-card p {
			text-align: center;
            font-size: 16px;
            color: #333;
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* 遮罩层 */
        .mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            z-index: 9999;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        /* 遮罩激活状态 */
        .mask.active {
            display: block;
            opacity: 1;
        }
        /* 弹窗容器 */
        .popup-container {
            width: 100%;
            height: 100%;
            display: flex;
            /* padding: 20px; */
        }
        /* 图片容器 */
        .popup-img-container {
            /* flex: 1; */
        	width: 800px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateX(-100%);
            transition: transform 0.6s ease;
            padding: 20px;
        	margin-left: 100px;
        }
        .popup-img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 10px;
           /* box-shadow: 0 0 20px rgba(0,0,0,0.5); */
        }
        /* 文字介绍容器 */
        .popup-text-container {
            /* flex: 1; */
            height: 100%;
        	width: 400px;
            background:#d4b98c;
        	padding-top: 250px;
        	padding-left: 30px;
        	padding-right: 30px;
            /* padding: 40px; */
            /* border-radius: 10px; */
            margin-left: 100px;
            transform: translateY(100%);
            transition: transform 0.6s ease 0.2s; /* 延迟出现，更丝滑 */
            overflow-y: auto; /* 内容超出可滚动 */
        }
        .popup-text-container h2 {
            font-size: 40px;
            color: #733900;
            margin-bottom: 20px;
            border-bottom: 2px solid #d35400;
            padding-bottom: 10px;
        }
        .popup-text-container p {
            font-size: 20px;
            line-height: 1.8;
            color: #333;
            margin-bottom: 15px;
        }
        /* 弹窗激活时的动画 */
        .mask.active .popup-img-container {
            transform: translateX(0);
        }
        .mask.active .popup-text-container {
            transform: translateY(0);
        }
        /* 关闭按钮 */
        .close-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: #ff4757;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 99999;
            pointer-events: auto;
            transition: background 0.3s ease;
        }
        .close-btn:hover {
            background: #ff3838;
        }

        /* ========== 新增：游戏相关样式 ========== */
        /* 游戏按钮 */
        .game-btn {
            position: fixed;
            bottom: 100px;
            left: 100px;
            z-index: 998;
            width: 180px;
            height: 70px;
            background: #733900;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        .game-btn:hover {
            background: #9e5100;
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        /* 游戏容器 */
        .game-container {
            position: fixed;
            top: 120px;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* background: rgba(255, 255, 255, 0.95); */
            z-index: 997;
            display: flex;
			padding-top: 50px;
            padding-left: 40px;
			padding-right: 40px;
            transform: translateX(-100%); /* 初始隐藏在左侧 */
            transition: transform 0.8s ease;
            overflow: hidden;
        }
        /* 游戏容器显示状态 */
        .game-container.show {
            transform: translateX(0);
        }
        /* 游戏返回按钮 */
        .game-back-btn {
            position: absolute;
            top: 1px;
            left: 55px;
            width: 50px;
            height: 50px;
            background: #733900;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            /* box-shadow: 0 0 10px rgba(0,0,0,0.5); */
            z-index: 10;
        }
        /* 游戏三个区域通用样式 */
        .game-area {
            flex: 1;
            height: 100%;
			padding-top: 20px;
			padding-left: 80px;
            /* padding: 20px; */
            display: flex;
            flex-direction: column;
            gap: 15px; /* 标签间距 */
        }
		.game-left-area  {
		    flex: 1;
		    height: 100%;
			padding-top: 20px;
			padding-left: 20px;
		    /* padding: 20px; */
		    display: flex;
		    flex-direction: column;
		    gap: 15px; /* 标签间距 */
		}
		.game-right-area  {
			/* border: #000000 solid; */
		    flex: 1;
		    height: 100%;
			padding-top: 20px;
			padding-left: 700px;
		    /* padding: 20px; */
		    display: flex;
		    flex-direction: column;
		    gap: 15px; /* 标签间距 */
		}
        /* 游戏区域标题 */
        .game-area-title {
            font-size: 32px;
            color: #733900;
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 3px solid #d35400;
            padding-bottom: 10px;
        }
        /* 中间匹配区域（特殊样式） */
        .game-middle-area {
            flex: 2; /* 中间区域更宽 */
            display: flex;
            flex-wrap: wrap; /* 换行排列 */
            align-content: flex-start;
            gap: 15px;
            /* background: rgba(245, 245, 245, 0.8); */
            border-radius: 10px;
            margin: 0 20px;
			/* border: #000000 solid; */
        }
        /* 景点名称标签（可拖拽） */
        .spot-tag {
			width: 130px;
            padding: 15px 25px;
            background: #733900;
            color: white;
            border-radius: 8px;
            font-size: 20px;
            text-align: center;
            cursor: grab;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
            user-select: none; /* 禁止选中文字 */
            transition: transform 0.2s ease;
        }
        .spot-tag:active {
            cursor: grabbing;
            transform: scale(0.95);
        }
        /* 中间匹配容器（虚线边框） */
        .match-container {
            width: 100px; /* 与标签大小一致 */
            height: 35px; /* 与标签大小一致 */
            border: 2px dashed #733900;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.9);
			
            /* 位置可通过以下属性调整，示例： */
            position: relative;
           /* top: XXpx;
            left: XXpx; */
        }
        /* 匹配成功后的标签样式（不可移动） */
        .match-container .spot-tag {
            cursor: default;
            background: #2ed573;
            box-shadow: none;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
        }
        /* 正确提示弹窗 */
        .correct-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(46, 213, 115, 0.95);
            color: white;
            padding: 30px 60px;
            border-radius: 10px;
            font-size: 32px;
            font-weight: bold;
            z-index: 99999;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        .correct-popup.show {
            transform: translate(-50%, -50%) scale(1);
        }
		
		/* ========== 新增：游戏规则容器样式 ========== */
		        .game-rule-container {
		            position: absolute;
		            bottom: 180px;
		            right: 160px;
		            z-index: 10;
		            width: 350px;
		            max-width: 90%;
		        }
		        /* 规则按钮 */
		        .game-rule-btn {
		            width: 100px;
		            height: 50px;
		            background: #aa0000;
		            color: white;
		            border: none;
		            border-radius: 8px;
		            font-size: 18px;
		            font-weight: bold;
		            cursor: pointer;
		            transition: all 0.3s ease;
		            margin-left: auto; /* 靠右显示 */
					/* 新增呼吸动画：时长2秒，缓动，无限循环 */
					    animation: breathe 2s ease-in-out infinite;
		        }
		        .game-rule-btn:hover {
		            background: #d80000;
					animation-play-state: paused; /* 暂停动画 */
					    transform: scale(1); /* 强制回到原始大小，避免停在放大状态 */
		        }
		        /* 规则内容面板 */
		        .game-rule-content {
		            background: rgba(255, 255, 255, 0.98);
		            border-radius: 10px;
		            padding: 10px;
		            margin-top: 5px;
		            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
		            display: none; /* 默认隐藏 */
		            animation: fadeIn 0.3s ease forwards;
		        }
		        /* 规则内容显示状态 */
		        .game-rule-content.show {
		            display: block;
		        }
		        /* 规则标题 */
		        .game-rule-title {
		            font-size: 24px;
		            color: #733900;
		            margin-bottom: 10px;
		            border-bottom: 2px solid #d35400;
		            padding-bottom: 8px;
		        }
		        /* 规则列表 */
		        .game-rule-list {
		            list-style: none;
		        }
		        .game-rule-list li {
		            font-size: 16px;
		            line-height: 1.2;
		            color: #333;
		            /* margin-bottom: 8px; */
		            padding-left: 10px;
		            position: relative;
		        }
		        .game-rule-list li:before {
		            content: "•";
		            color: #733900;
		            font-size: 20px;
		            position: absolute;
		            left: 0;
		            top: 0;
		        }

        /* ========== 动画定义 ========== */
        /* 标注点渐入动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) translateY(0);
            }
        }
        /* 指示线和卡片渐入动画 */
        @keyframes fadeInLine {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
		/* 规则面板渐入动画 */
		        @keyframes fadeIn {
		            from {
		                opacity: 0;
		                transform: translateY(10px);
		            }
		            to {
		                opacity: 1;
		                transform: translateY(0);
		            }
		        }
				/* 呼吸/缩放浮动动画（垂直于屏幕） */
				@keyframes breathe {
				    0% {
				        transform: scale(1); /* 原始大小 */
				    }
				    50% {
				        transform: scale(1.1); /* 放大10%，可调整 */
				    }
				    100% {
				        transform: scale(1); /* 回到原始大小 */
				    }
				}

        /* ========== 为每个标注点设置不同的动画延迟，实现依次出现 ========== */
        .spot-marker:nth-child(1), .indicator-line-container:nth-child(1) { animation-delay: 0.1s; }
        .spot-marker:nth-child(2), .indicator-line-container:nth-child(2) { animation-delay: 0.2s; }
        .spot-marker:nth-child(3), .indicator-line-container:nth-child(3) { animation-delay: 0.3s; }
        .spot-marker:nth-child(4), .indicator-line-container:nth-child(4) { animation-delay: 0.4s; }
        .spot-marker:nth-child(5), .indicator-line-container:nth-child(5) { animation-delay: 0.5s; }
        .spot-marker:nth-child(6), .indicator-line-container:nth-child(6) { animation-delay: 0.6s; }
        .spot-marker:nth-child(7), .indicator-line-container:nth-child(7) { animation-delay: 0.7s; }
        .spot-marker:nth-child(8), .indicator-line-container:nth-child(8) { animation-delay: 0.8s; }
        .spot-marker:nth-child(9), .indicator-line-container:nth-child(9) { animation-delay: 0.9s; }
        .spot-marker:nth-child(10), .indicator-line-container:nth-child(10) { animation-delay: 1.0s; }
        .spot-marker:nth-child(11), .indicator-line-container:nth-child(11) { animation-delay: 1.1s; }
        .spot-marker:nth-child(12), .indicator-line-container:nth-child(12) { animation-delay: 1.2s; }
        .spot-marker:nth-child(13), .indicator-line-container:nth-child(13) { animation-delay: 1.3s; }
    </style>
</head>
<body>
    <!-- 标题容器 -->
    <div class="title-container">
        <h1>明故宫总览地图</h1>
    </div>
    <!-- 返回首页按钮 -->
    <a href="导航.html" class="back-home-btn"> 
        <div class="btn-bg"></div> 
        <span class="btn-text">返回首页</span> 
    </a>

    <!-- ========== 景点标注容器 ========== -->
    <div class="spot-markers" id="spotMarkers">
        <!-- 1. 午门 -->
        <div class="spot-marker" style="bottom: 30%; left: 49.5%;" 
             data-img="img/b午朝门.png" 
             data-title="午朝门"
             data-desc="午朝门是南京明故宫宫城正南门，因 “居中向阳、位当子午” 得名，是宫城礼制核心。设三孔券门，原建五凤楼，为帝后、百官出入要道，也是皇帝举行大典、传旨之地。现存须弥座刻有明初卷云纹，青石板路留存至今，是明故宫最具标志性的遗址之一，见证大明皇权威仪。">
            <div class="indicator-line-container left">
                <div class="indicator-line" style="width: 550px;"></div>
                <div class="spot-card">
                    <p>午朝门</p>
                </div>
            </div>
        </div>
        <!-- 2. 奉天门 -->
        <div class="spot-marker" style="bottom: 37%; left: 49.5%;" 
             data-img="img/b奉天门.png" 
             data-title="奉天门"
             data-desc="奉天门位于午门以北，是明故宫外朝门户，明初 “御门听政” 的核心场所。北接奉天殿，南连午门，是宫廷门禁与正殿仪式的过渡空间，重大政务、朝见议事多在此举行。原建筑已毁，考古发掘的夯土台基与柱础，为复原外朝格局提供了关键依据。">
            <div class="indicator-line-container left">
                <div class="indicator-line" style="width: 500px;"></div>
                <div class="spot-card">
                    <p>奉天门</p>
                </div>
            </div>
        </div>
        <!-- 3. 文华殿 -->
        <div class="spot-marker" style="bottom: 43%; left: 63%;" 
             data-img="img/b文华殿.png" 
             data-title="文华殿"
             data-desc="文华殿位于明故宫中轴线东侧，与武英殿对称，是前朝重要殿宇。明初为太子讲学、大臣经筵之所，兼具礼仪与教育功能，也用于皇帝召见儒臣、商议政务。北京故宫文华殿仿此建制，现存夯土台基与柱础，是复原宫城东侧格局的重要线索。">
            <div class="indicator-line-container">
                <div class="indicator-line" style="width: 280px;"></div>
                <div class="spot-card">
                    <p>文华殿</p>
                </div>
            </div>
        </div>
        <!-- 4. 武英殿 -->
        <div class="spot-marker" style="bottom: 43%; left: 33%;" 
             data-img="img/武英殿.jpg" 
             data-title="武英殿"
             data-desc="武英殿位于明故宫中轴线西侧，与东侧文华殿对称，是前朝重要辅助殿宇。明初为皇帝处理日常政务、召见臣子、举行礼仪的场所，依 “左文右武” 规制布局。地表建筑已无存，仅存夯土台基与柱础，是研究明初宫殿功能分区的重要实物。">

    <!-- 正确提示弹窗 -->
    <div class="correct-popup" id="correctPopup">真棒！答对了👍</div>

    <script>
        // ========== 原有交互逻辑 ==========
        document.addEventListener('DOMContentLoaded', function() {
            // 获取元素
            const spotMarkers = document.querySelectorAll('.spot-marker');
            const mask = document.getElementById('spotMask');
            const closeBtn = document.getElementById('closeBtn');
            const popupImg = document.getElementById('popupImg');
            const popupTitle = document.getElementById('popupTitle');
            const popupDesc = document.getElementById('popupDesc');

            // 标注点点击事件
            spotMarkers.forEach(marker => {
                marker.addEventListener('click', function() {
                    // 获取标注点的自定义数据
                    const imgSrc = this.getAttribute('data-img');
                    const title = this.getAttribute('data-title');
                    const desc = this.getAttribute('data-desc');
                    
                    // 设置弹窗内容
                    popupImg.src = imgSrc;
                    popupImg.alt = title;
                    popupTitle.textContent = title;
                    popupDesc.textContent = desc;
                    
                    // 显示遮罩
                    mask.classList.add('active');
                    // 禁止页面滚动
                    document.body.style.overflow = 'hidden';
                });
            });

            // 关闭按钮点击事件
            closeBtn.addEventListener('click', function() {
                // 隐藏遮罩
                mask.classList.remove('active');
                // 恢复页面滚动
                document.body.style.overflow = 'auto';
                
                // 重置弹窗动画（以便下次打开重新动画）
                setTimeout(() => {
                    popupImg.src = '';
                    popupTitle.textContent = '';
                    popupDesc.textContent = '';
                }, 500);
            });

            // 点击遮罩空白处关闭
            mask.addEventListener('click', function(e) {
                if (e.target === mask) {
                    closeBtn.click();
                }
            });

            // 键盘ESC关闭
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && mask.classList.contains('active')) {
                    closeBtn.click();
                }
            });

            // ========== 新增：游戏逻辑 ==========
            // 游戏相关元素
            const gameBtn = document.getElementById('gameBtn');
            const gameContainer = document.getElementById('gameContainer');
            const gameBackBtn = document.getElementById('gameBackBtn');
            const spotMarkersContainer = document.getElementById('spotMarkers');
            const correctPopup = document.getElementById('correctPopup');
            const spotTags = document.querySelectorAll('.spot-tag');
            const matchContainers = document.querySelectorAll('.match-container');
            
            // 游戏按钮点击事件：隐藏标注，显示游戏
            gameBtn.addEventListener('click', function() {
                spotMarkersContainer.classList.add('hide');
                gameContainer.classList.add('show');
                document.body.style.overflow = 'hidden'; // 禁止滚动
            });

            // 游戏返回按钮：显示标注，隐藏游戏
            gameBackBtn.addEventListener('click', function() {
                gameContainer.classList.remove('show');
                setTimeout(() => {
                    spotMarkersContainer.classList.remove('hide');
                    document.body.style.overflow = 'auto'; // 恢复滚动
                }, 500);
            });
			
			 // ========== 新增：游戏规则交互逻辑 ==========
			            const gameRuleBtn = document.getElementById('gameRuleBtn');
			            const gameRuleContent = document.getElementById('gameRuleContent');
			            
			            // 游戏规则按钮点击事件（切换显示/隐藏）
			            gameRuleBtn.addEventListener('click', function() {
			                gameRuleContent.classList.toggle('show');
			                // 切换按钮文字
			                this.textContent = gameRuleContent.classList.contains('show') ? '收起规则' : '游戏规则';
			            });

            // 拖拽功能实现
            let draggedTag = null;
            
            // 1. 拖拽开始事件
            spotTags.forEach(tag => {
                tag.addEventListener('dragstart', function(e) {
                    // 跳过已匹配的标签（不可拖拽）
                    if (this.parentElement.classList.contains('match-container')) {
                        e.preventDefault();
                        return;
                    }
                    
                    draggedTag = this;
                    // 设置拖拽数据
                    e.dataTransfer.setData('text/plain', this.getAttribute('data-name'));
                    // 延迟添加拖拽样式（解决视觉闪烁）
                    setTimeout(() => {
                        this.style.opacity = '0.5';
                    }, 0);
                });

                // 拖拽结束事件
                tag.addEventListener('dragend', function() {
                    this.style.opacity = '1';
                    draggedTag = null;
                });
            });

            // 2. 匹配容器拖拽事件
            matchContainers.forEach(container => {
                // 允许放置
                container.addEventListener('dragover', function(e) {
                    e.preventDefault(); // 必须阻止默认行为才能触发drop
                    this.style.borderColor = '#2ed573'; // 拖拽时高亮边框
                });

                // 离开容器
                container.addEventListener('dragleave', function() {
                    this.style.borderColor = '#733900'; // 恢复原边框颜色
                });

                // 放置事件
                container.addEventListener('drop', function(e) {
                    e.preventDefault();
                    this.style.borderColor = '#733900'; // 恢复原边框颜色
                    
                    // 如果容器已有标签，直接返回
                    if (this.children.length > 0) return;
                    
                    // 获取拖拽的景点名称和容器目标名称
                    const draggedName = e.dataTransfer.getData('text/plain');
                    const targetName = this.getAttribute('data-target');
                    
                    // 匹配成功
                    if (draggedName === targetName && draggedTag) {
                        // 克隆标签（避免原标签消失）
                        const tagClone = draggedTag.cloneNode(true);
                        tagClone.removeAttribute('draggable'); // 移除拖拽属性
                        tagClone.style.cursor = 'default'; // 恢复光标
                        
                        // 将克隆标签放入容器
                        this.appendChild(tagClone);
                        // 移除原标签
                        draggedTag.remove();
                        
                        // 显示成功提示
                        correctPopup.classList.add('show');
                        setTimeout(() => {
                            correctPopup.classList.remove('show');
                        }, 1500);
                    }
                    // 匹配失败：无任何反应
                });
            });
        });
    </script>
